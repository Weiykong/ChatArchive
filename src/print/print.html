<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preparing PDF</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f3f6fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #667085;
      --line: rgba(15, 23, 42, 0.08);
      --accent: #185adb;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --line: rgba(255, 255, 255, 0.08);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, rgba(24, 90, 219, 0.12), transparent 38%), var(--bg);
      color: var(--text);
      font-family: "Inter", "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    main {
      max-width: 420px;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      text-align: center;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.4rem;
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    button {
      margin-top: 18px;
      border: none;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 600;
      padding: 10px 16px;
      cursor: pointer;
      display: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Preparing print-ready PDF</h1>
    <p id="status">Loading your exported conversation and opening the print dialog.</p>
    <button id="retryButton" type="button">Open Print Dialog</button>
  </main>

  <script src="print.js"></script>
</body>
</html>
